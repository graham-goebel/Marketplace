<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ohio Cannabis Business Map</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css" crossorigin=""/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" crossorigin=""/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" crossorigin=""/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app">

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M16 3C13 3 10.5 5.5 10.5 9c0 2 .8 3.8 2.1 5L16 29l3.4-15c1.3-1.2 2.1-3 2.1-5C21.5 5.5 19 3 16 3z" fill="#4ade80"/>
              <path d="M6 12c-1.1 0-2 .4-2.7 1.1C2.6 13.8 2 14.9 2 16s.6 2.2 1.3 2.9C4 19.6 4.9 20 6 20h20c1.1 0 2-.4 2.7-1.1C29.4 18.2 30 17.1 30 16s-.6-2.2-1.3-2.9C28 12.4 27.1 12 26 12H6z" fill="#4ade80" opacity="0.4"/>
            </svg>
          </div>
          <div class="logo-text">
            <h1>Ohio Cannabis Map</h1>
            <p>Licensed Business Directory</p>
          </div>
        </div>
      </div>

      <div class="sidebar-body">
        <div class="search-section">
          <div class="search-wrapper">
            <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
              <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
            </svg>
            <input
              type="text"
              id="search-input"
              placeholder="Search name, city, or zip..."
              autocomplete="off"
            />
            <button class="clear-btn" id="clear-btn" title="Clear search">&#x2715;</button>
          </div>
        </div>

        <div class="filter-section">
          <div class="filter-grid">
            <button class="filter-btn active" data-type="all">
              All
              <span class="badge" id="badge-all">0</span>
            </button>
            <button class="filter-btn" data-type="dispensary">
              <span class="dot dispensary"></span>Dispensaries
              <span class="badge" id="badge-dispensary">0</span>
            </button>
            <button class="filter-btn" data-type="processor">
              <span class="dot processor"></span>Processors
              <span class="badge" id="badge-processor">0</span>
            </button>
            <button class="filter-btn" data-type="distributor">
              <span class="dot distributor"></span>Distributors
              <span class="badge" id="badge-distributor">0</span>
            </button>
          </div>
        </div>

        <div class="results-header">
          <span id="results-count">Loading...</span>
        </div>

        <div class="results-list" id="results-list"></div>
      </div>

      <div class="sidebar-footer">
        <span>Data: Ohio Division of Cannabis Control &mdash;</span>
        <a href="https://cannabis.ohio.gov" target="_blank" rel="noopener noreferrer">cannabis.ohio.gov</a>
      </div>
    </aside>

    <main class="map-wrapper">
      <div id="map"></div>

      <div class="legend">
        <div class="legend-row">
          <span class="legend-dot dispensary"></span>
          <span>Dispensary</span>
        </div>
        <div class="legend-row">
          <span class="legend-dot processor"></span>
          <span>Processor</span>
        </div>
        <div class="legend-row">
          <span class="legend-dot distributor"></span>
          <span>Distributor</span>
        </div>
      </div>

      <button class="mobile-toggle" id="mobile-toggle">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
          <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
        </svg>
        Directory
      </button>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js" crossorigin=""></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" crossorigin=""></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Mobile toggle runs independently of map init
    document.getElementById('mobile-toggle').addEventListener('click', function () {
      document.getElementById('sidebar').classList.toggle('open');
    });
  </script>
</body>
</html>
